<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediScan — Chest X-Ray Analysis</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0a0f1e; color:#e0e6f0; min-height:100vh; }
.header { background:linear-gradient(135deg,#0d1b2a,#1a3a5c); padding:20px 40px; display:flex; align-items:center; border-bottom:2px solid #1e4d8c; }
.header h1 { font-size:28px; font-weight:700; color:#4fc3f7; }
.header p { font-size:13px; color:#90a4ae; margin-top:2px; }
.live { background:#1b5e20; color:#a5d6a7; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-left:auto; }
.container { max-width:1100px; margin:40px auto; padding:0 24px; display:grid; grid-template-columns:1fr 1fr; gap:28px; }
.card { background:#0d1b2a; border:1px solid #1e3a5f; border-radius:16px; padding:28px; }
.card h2 { font-size:16px; font-weight:600; color:#4fc3f7; margin-bottom:20px; }
.upload-area { border:2px dashed #1e4d8c; border-radius:12px; padding:40px 20px; text-align:center; cursor:pointer; transition:all 0.3s; position:relative; }
.upload-area:hover { border-color:#4fc3f7; background:#0a1929; }
.upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:48px; margin-bottom:12px; }
.upload-area p { color:#90a4ae; font-size:14px; margin-top:8px; }
.preview-img { width:100%; border-radius:12px; margin-top:16px; display:none; max-height:280px; object-fit:contain; background:#060d18; }
.btn { width:100%; margin-top:20px; padding:14px; background:linear-gradient(135deg,#1565c0,#0288d1); color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; }
.btn:hover { opacity:0.9; }
.btn:disabled { background:#263238; color:#546e7a; cursor:not-allowed; }
.loading { display:none; text-align:center; padding:20px; }
.spinner { width:40px; height:40px; border:4px solid #1e3a5f; border-top:4px solid #4fc3f7; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.result { display:none; }
.risk-badge { display:inline-block; padding:8px 24px; border-radius:30px; font-size:18px; font-weight:700; margin-bottom:16px; }
.risk-HIGH { background:#b71c1c; color:#ffcdd2; }
.risk-MEDIUM { background:#e65100; color:#ffe0b2; }
.risk-LOW { background:#1b5e20; color:#c8e6c9; }
.diagnosis { font-size:26px; font-weight:700; margin-bottom:8px; }
.diagnosis.PNEUMONIA { color:#ef5350; }
.diagnosis.NORMAL { color:#66bb6a; }
.prob-bar-wrap { background:#1e3a5f; border-radius:8px; height:10px; margin:16px 0 6px; overflow:hidden; }
.prob-bar { height:100%; border-radius:8px; transition:width 1s ease; background:linear-gradient(90deg,#1565c0,#ef5350); }
.prob-label { font-size:13px; color:#90a4ae; margin-bottom:20px; }
.recommendation { background:#0a1929; border-left:4px solid #4fc3f7; padding:14px 18px; border-radius:0 8px 8px 0; font-size:14px; color:#b0bec5; line-height:1.6; margin-bottom:20px; }
.meta { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.meta-item { background:#0a1929; border:1px solid #1e3a5f; border-radius:8px; padding:12px; }
.meta-item label { font-size:11px; color:#546e7a; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:4px; }
.meta-item span { font-size:15px; font-weight:600; color:#e0e6f0; }
.heatmap-img { width:100%; border-radius:12px; display:none; max-height:280px; object-fit:contain; background:#060d18; margin-top:12px; }
.heatmap-label { font-size:12px; color:#546e7a; text-align:center; margin-top:8px; }
.error-box { display:none; background:#1a0a0a; border:1px solid #b71c1c; border-radius:10px; padding:16px; color:#ef9a9a; font-size:14px; margin-top:16px; }
@media (max-width:700px) { .container { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏥 MediScan</h1>
    <p>AI-powered Chest X-Ray Pneumonia Detection</p>
  </div>
  <div class="live">● Live</div>
</div>

<div class="container">

  <!-- Upload Card -->
  <div class="card">
    <h2>📤 Upload Chest X-Ray</h2>
    <div class="upload-area">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">🫁</div>
      <div style="font-size:16px;font-weight:600;color:#4fc3f7">Click or drag X-ray here</div>
      <p>Supports JPEG, PNG • Chest X-rays only</p>
    </div>
    <img id="previewImg" class="preview-img" alt="Preview">
    <button class="btn" id="analyzeBtn" disabled onclick="analyze()">🔬 Analyze X-Ray</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Result Card -->
  <div class="card">
    <h2>📊 Analysis Result</h2>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color:#90a4ae">Analyzing X-ray — please wait...</p>
    </div>

    <div class="result" id="result">
      <div class="diagnosis" id="diagnosisText"></div>
      <div class="risk-badge" id="riskBadge"></div>
      <div class="prob-bar-wrap">
        <div class="prob-bar" id="probBar" style="width:0%"></div>
      </div>
      <div class="prob-label" id="probLabel"></div>
      <div class="recommendation" id="recommendation"></div>
      <div class="meta">
        <div class="meta-item">
          <label>Model Version</label>
          <span id="modelVersion">—</span>
        </div>
        <div class="meta-item">
          <label>Time</label>
          <span id="timestamp">—</span>
        </div>
      </div>
    </div>

    <div id="heatmapSection" style="display:none;margin-top:20px">
      <h2 style="font-size:14px;color:#4fc3f7;margin-bottom:8px">🔥 Grad-CAM Heatmap</h2>
      <img id="heatmapImg" class="heatmap-img" alt="Grad-CAM Heatmap">
      <p class="heatmap-label">Highlighted regions influenced the AI diagnosis</p>
    </div>
  </div>

</div>

<script>
const API = "https://sunilakiran56-mediscan.hf.space";

const fileInput = document.getElementById("fileInput");
const previewImg = document.getElementById("previewImg");
const analyzeBtn = document.getElementById("analyzeBtn");

fileInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    previewImg.style.display = "block";
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = "🔬 Analyze X-Ray";
  };
  reader.readAsDataURL(file);
});

async function analyze() {
  const file = fileInput.files[0];
  if (!file) return;

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";
  document.getElementById("heatmapSection").style.display = "none";
  document.getElementById("errorBox").style.display = "none";
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = "Analyzing...";

  try {
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(`${API}/predict`, { method:"POST", body:formData });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";

    // Diagnosis
    const diag = document.getElementById("diagnosisText");
    diag.textContent = data.predicted_class === "PNEUMONIA" ? "⚠️ Pneumonia Detected" : "✅ Normal";
    diag.className = `diagnosis ${data.predicted_class}`;

    // Risk
    const risk = document.getElementById("riskBadge");
    risk.textContent = `${data.risk_level} RISK`;
    risk.className = `risk-badge risk-${data.risk_level}`;

    // Probability
    const prob = Math.round(data.probability * 100);
    document.getElementById("probBar").style.width = `${prob}%`;
    document.getElementById("probLabel").textContent = `Pneumonia probability: ${prob}%`;

    // Recommendation
    document.getElementById("recommendation").textContent = data.recommendation;

    // Meta
    document.getElementById("modelVersion").textContent = data.model_version || "0.1.0";
    document.getElementById("timestamp").textContent = new Date(data.timestamp).toLocaleTimeString();

    // Grad-CAM
    if (data.gradcam_heatmap) {
      document.getElementById("heatmapImg").src = `data:image/jpeg;base64,${data.gradcam_heatmap}`;
      document.getElementById("heatmapImg").style.display = "block";
      document.getElementById("heatmapSection").style.display = "block";
    }

  } catch(err) {
    document.getElementById("loading").style.display = "none";
    const eb = document.getElementById("errorBox");
    eb.style.display = "block";
    eb.textContent = `Error: ${err.message}`;
  }

  analyzeBtn.disabled = false;
  analyzeBtn.textContent = "🔬 Analyze Again";
}
</script>
</body>
</html>
