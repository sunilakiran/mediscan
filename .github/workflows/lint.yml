name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 mediscan/ tests/ --max-line-length=120 --ignore=E501,W503,E221,E241,F401,W292,E272,E271,E261,E262,E265,E266,W291,W293,E303,E302,E301,E305,E306